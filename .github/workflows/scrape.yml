name: Scrape Reference Docs
on:
  schedule:
    - cron: "0 */72 * * *" # every 72 hours
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.commit.outputs.docs_changed }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run index.ts
      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes detected"
            echo "docs_changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "docs: update reference docs $(date -u +%Y-%m-%d)"
            git push
            echo "docs_changed=true" >> $GITHUB_OUTPUT
            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

  release:
    needs: scrape
    if: needs.scrape.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: git pull # fetch the commit pushed by the scrape job
      - name: Create release
        run: |
          SHA=$(git rev-parse --short HEAD)
          gh release create "docs-$(date -u +%Y-%m-%d)-${SHA}" \
            --title "Docs update ${SHA}" \
            --notes "Automated documentation update at commit ${SHA}"
        env:
          GH_TOKEN: ${{ github.token }}
