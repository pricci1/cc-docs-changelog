name: Build Blog
on:
  workflow_dispatch:
    inputs:
      subagent_model:
        description: "OpenRouter model ID for per-file diff analysis"
        required: false
        default: "google/gemini-3.1-flash-lite-preview"
      synthesis_model:
        description: "OpenRouter model ID for final post synthesis"
        required: false
        default: "google/gemini-3.1-pro-preview"
jobs:
  blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build site
        run: bun run blog/build.ts
        env:
          SUBAGENT_MODEL: ${{ inputs.subagent_model }}
          SYNTHESIS_MODEL: ${{ inputs.synthesis_model }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blog/dist/
      - uses: actions/deploy-pages@v4
        id: deployment
